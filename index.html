		<h1>홍찬희를 마주치다</h1>
		<p>기: 어느 금요일, 오전 일정을 마치고 오랜만에 새 책을 사러 교보문고에 갔어요.</p>
		<p>승: 이럴수가. 고등학생 시절 너무나 좋아했던 바밍타이거의 홍찬희씨가 있었습니다. 웬걸 그와 2초가량 눈이 마주쳤습니다!!</p>
		<p>전: ‘와 교보에서 홍찬희를 보네’ 생각하고 그대로 갈 길을 갔습니다. 그날 교보문고를 나오며 너무나!!! 후회했습니다. 뭐라도 줄걸.</p>
		<p>결: 이제는 늘 언제 어디서나 누구든 줄 수 있도록 내 그림 10장 정도를 들고 다녀요.</p>
